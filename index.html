<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Local TTS Receiver</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="enableOverlay">
        <button id="enableAudioBtn" type="button">Click to enable TTS</button>
    </div>

    <div id="controls">
        <button id="muteBtn" type="button">Mute</button>
        <label>
            Volume
            <input id="volumeSlider" type="range" min="0" max="100" value="80">
        </label>
        <label>
            TTS
            <select id="ttsMode">
                <option value="server" selected>Server (Neural)</option>
                <option value="browser">Browser</option>
            </select>
        </label>
        <label id="serverVoiceWrap">
            Neural voice
            <select id="serverVoice"></select>
        </label>
        <label id="browserVoiceWrap">
            Browser voice
            <select id="browserVoice"></select>
        </label>
        <span id="buildTag" style="opacity:0.6;font-size:11px;">v2</span>
    </div>

    <div id="chatLine">TTS System Active. Awaiting chat events...</div>
    <div id="engineLog"></div>

    <script>
        const chatLine = document.getElementById('chatLine');
        const engineLog = document.getElementById('engineLog');
        const muteBtn = document.getElementById('muteBtn');
        const volumeSlider = document.getElementById('volumeSlider');
        const ttsModeSelect = document.getElementById('ttsMode');
        const browserVoiceSelect = document.getElementById('browserVoice');
        const serverVoiceSelect = document.getElementById('serverVoice');
        const serverVoiceWrap = document.getElementById('serverVoiceWrap');
        const browserVoiceWrap = document.getElementById('browserVoiceWrap');
        const enableOverlay = document.getElementById('enableOverlay');
        const enableAudioBtn = document.getElementById('enableAudioBtn');

        const speechQueue = [];
        let isSpeaking = false;
        let isMuted = false;
        let audioEnabled = false;
        let currentAudio = null;

        const settings = {
            muted: localStorage.getItem('ttsMuted') === 'true',
            volume: Number(localStorage.getItem('ttsVolume') ?? 80),
            mode: localStorage.getItem('ttsMode') ?? 'server',
            browserVoice: localStorage.getItem('ttsBrowserVoice') ?? '',
            serverVoice: localStorage.getItem('ttsServerVoice') ?? 'en-US-JennyNeural',
        };

        isMuted = settings.muted;
        volumeSlider.value = settings.volume;
        ttsModeSelect.value = settings.mode;

        function saveSettings() {
            localStorage.setItem('ttsMuted', String(isMuted));
            localStorage.setItem('ttsVolume', volumeSlider.value);
            localStorage.setItem('ttsMode', ttsModeSelect.value);
            localStorage.setItem('ttsBrowserVoice', browserVoiceSelect.value);
            localStorage.setItem('ttsServerVoice', serverVoiceSelect.value);
        }

        function updateMuteButton() {
            muteBtn.textContent = isMuted ? 'Unmute' : 'Mute';
            muteBtn.classList.toggle('muted', isMuted);
        }

        function getVolume() {
            return Number(volumeSlider.value) / 100;
        }

        function updateVoiceVisibility() {
            const serverMode = ttsModeSelect.value === 'server';
            serverVoiceWrap.style.display = serverMode ? 'inline-flex' : 'none';
            browserVoiceWrap.style.display = serverMode ? 'none' : 'inline-flex';
        }

        function appendEngineLog(entry) {
            const line = document.createElement('div');
            line.className = `log-${entry.level || 'info'}`;
            line.textContent = `[${entry.time}] ${entry.message}`;
            engineLog.appendChild(line);
            engineLog.scrollTop = engineLog.scrollHeight;

            while (engineLog.children.length > 50) {
                engineLog.removeChild(engineLog.firstChild);
            }
        }

        function populateServerVoices(voices) {
            const englishVoices = voices.filter((voice) => voice.locale.startsWith('en-'));
            const list = englishVoices.length > 0 ? englishVoices : voices;

            serverVoiceSelect.innerHTML = '';
            list.forEach((voice) => {
                const option = document.createElement('option');
                option.value = voice.name;
                option.textContent = voice.label;
                serverVoiceSelect.appendChild(option);
            });

            if (settings.serverVoice) {
                serverVoiceSelect.value = settings.serverVoice;
            }
            if (!serverVoiceSelect.value && serverVoiceSelect.options.length > 0) {
                serverVoiceSelect.selectedIndex = 0;
            }
        }

        async function loadServerVoices() {
            try {
                const response = await fetch('http://127.0.0.1:8080/api/voices', { cache: 'no-store' });
                if (!response.ok) {
                    throw new Error(`Voice list failed (${response.status})`);
                }
                populateServerVoices(await response.json());
            } catch (error) {
                appendEngineLog({
                    time: new Date().toLocaleTimeString(),
                    level: 'warn',
                    message: `Voice API unavailable (${error.message}). Waiting for SSE voice list...`,
                });
            }
        }

        function loadBrowserVoices() {
            const voices = window.speechSynthesis.getVoices();
            browserVoiceSelect.innerHTML = '';

            voices.forEach((voice) => {
                const option = document.createElement('option');
                option.value = voice.name;
                option.textContent = `${voice.name} (${voice.lang})`;
                browserVoiceSelect.appendChild(option);
            });

            if (settings.browserVoice) {
                browserVoiceSelect.value = settings.browserVoice;
            }
        }

        async function unlockAudio() {
            audioEnabled = true;
            enableOverlay.classList.add('hidden');

            const silent = new Audio('data:audio/mp3;base64,SUQzBAAAAAAAI1RTU0UAAAAPAAADTGF2ZjU4Ljc2LjEwMAAAAAAAAAAAAAAA//tQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAWGluZwAAAA8AAAACAAABhgC7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7//////////////////////////////////////////////////////////////////8AAAAATGF2YzU4LjEzAAAAAAAAAAAAAAAAJAAAAAAAAAAAAYYoRwmHAAAAAAD/+1DEAAAHAAGf9AAAIAAANIAAAAQAAAaAAAAD/+1DEAg/wAABpAAAACAAAD/AAAA');
            silent.volume = 0;
            try {
                await silent.play();
            } catch (error) {
                console.warn('Silent unlock failed:', error);
            }

            processQueue();
        }

        window.speechSynthesis.onvoiceschanged = loadBrowserVoices;
        loadBrowserVoices();
        loadServerVoices();
        updateMuteButton();
        updateVoiceVisibility();

        enableAudioBtn.addEventListener('click', unlockAudio);

        muteBtn.addEventListener('click', () => {
            isMuted = !isMuted;
            updateMuteButton();

            if (isMuted) {
                speechQueue.length = 0;
                window.speechSynthesis.cancel();
                if (currentAudio) {
                    currentAudio.pause();
                    currentAudio = null;
                }
                isSpeaking = false;
            }

            saveSettings();
        });

        volumeSlider.addEventListener('input', () => {
            if (currentAudio) {
                currentAudio.volume = getVolume();
            }
            saveSettings();
        });

        ttsModeSelect.addEventListener('change', () => {
            updateVoiceVisibility();
            saveSettings();
        });

        browserVoiceSelect.addEventListener('change', saveSettings);
        serverVoiceSelect.addEventListener('change', saveSettings);

        function finishSpeaking() {
            isSpeaking = false;
            currentAudio = null;
            processQueue();
        }

        async function speakWithServer(text) {
            const voice = encodeURIComponent(serverVoiceSelect.value);
            const response = await fetch(
                `http://localhost:8080/api/tts?text=${encodeURIComponent(text)}&voice=${voice}`
            );
            if (!response.ok) {
                throw new Error(`Server TTS failed (${response.status})`);
            }

            const blob = await response.blob();
            const url = URL.createObjectURL(blob);
            const audio = new Audio(url);
            audio.volume = getVolume();
            currentAudio = audio;

            await new Promise((resolve, reject) => {
                audio.onended = () => {
                    URL.revokeObjectURL(url);
                    resolve();
                };
                audio.onerror = () => {
                    URL.revokeObjectURL(url);
                    reject(new Error('Audio playback failed'));
                };
                audio.play().catch(reject);
            });
        }

        function speakWithBrowser(text) {
            return new Promise((resolve, reject) => {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = 1.0;
                utterance.pitch = 1.0;
                utterance.volume = getVolume();

                const selectedVoice = window.speechSynthesis
                    .getVoices()
                    .find((voice) => voice.name === browserVoiceSelect.value);
                if (selectedVoice) {
                    utterance.voice = selectedVoice;
                }

                utterance.onend = resolve;
                utterance.onerror = () => reject(new Error('Browser TTS failed'));
                window.speechSynthesis.speak(utterance);
            });
        }

        async function processQueue() {
            if (!audioEnabled || isSpeaking || isMuted || speechQueue.length === 0) {
                return;
            }

            isSpeaking = true;
            const messageText = speechQueue.shift();

            try {
                if (ttsModeSelect.value === 'server') {
                    await speakWithServer(messageText);
                } else {
                    await speakWithBrowser(messageText);
                }
            } catch (error) {
                appendEngineLog({
                    time: new Date().toLocaleTimeString(),
                    level: 'warn',
                    message: `Playback issue: ${error.message}`,
                });
                if (ttsModeSelect.value === 'server') {
                    try {
                        await speakWithBrowser(messageText);
                    } catch (fallbackError) {
                        appendEngineLog({
                            time: new Date().toLocaleTimeString(),
                            level: 'error',
                            message: `Fallback TTS failed: ${fallbackError.message}`,
                        });
                    }
                }
            } finally {
                finishSpeaking();
            }
        }

        const eventSource = new EventSource('http://localhost:8081');

        eventSource.onmessage = (event) => {
            if (event.data.startsWith(':')) {
                return;
            }

            const data = JSON.parse(event.data);

            if (data.type === 'log') {
                appendEngineLog(data);
                return;
            }

            if (data.type === 'voices') {
                populateServerVoices(data.voices);
                return;
            }

            chatLine.innerText = `${data.user}: ${data.text}`;

            if (!isMuted && data.text) {
                speechQueue.push(data.text);
                processQueue();
            }
        };

        eventSource.onerror = () => {
            appendEngineLog({
                time: new Date().toLocaleTimeString(),
                level: 'warn',
                message: 'Connection to core engine broken. Retrying...',
            });
        };
    </script>
</body>
</html>
